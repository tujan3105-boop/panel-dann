# Internet war profile (restrictive but still usable for authenticated panel traffic)
limit_req zone=global_www_internetwar burst=12 nodelay;

# Drop suspicious random-query floods before reaching PHP.
if ($args ~ ".{24,}") {
    return 444;
}

# Most flood traffic targets "/" with random query keys; legitimate panel root does not need query params.
location = / {
    if ($args != "") {
        return 444;
    }
    limit_req zone=global_www_internetwar burst=3 nodelay;
    try_files $uri $uri/ /index.php?$query_string;
}

location /auth/login {
    limit_req zone=auth_login_internetwar burst=1 nodelay;
    try_files $uri $uri/ /index.php?$query_string;
}

location ~* ^/api/client/servers/[a-f0-9-]+/(resources|websocket)$ {
    limit_req zone=global_api_elevated burst=180 nodelay;
    try_files $uri $uri/ /index.php?$query_string;
}

location /api/ {
    limit_req zone=global_api_internetwar burst=12 nodelay;
    try_files $uri $uri/ /index.php?$query_string;
}
