[INCLUDES]
before = common.conf

[Definition]
actionstart = nft list table inet gantengdann_ddos >/dev/null 2>&1 || nft -f /etc/nftables.d/gantengdann-ddos.nft
actionstop =
actioncheck = nft list table inet gantengdann_ddos >/dev/null 2>&1
actionban = sh -c 'case "<ip>" in *:*) nft add element inet gantengdann_ddos blocklist6 { <ip> timeout <bantime>s } ;; *) nft add element inet gantengdann_ddos blocklist { <ip> timeout <bantime>s } ;; esac'
actionunban = sh -c 'case "<ip>" in *:*) nft delete element inet gantengdann_ddos blocklist6 { <ip> } ;; *) nft delete element inet gantengdann_ddos blocklist { <ip> } ;; esac' || true

[Init]
